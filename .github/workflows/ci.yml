name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Lint
        working-directory: packages/deno
        run: deno lint

      - name: Run tests
        working-directory: packages/deno
        run: deno task test

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: packages/python
        run: pip install -e .[dev]

      - name: Run tests
        working-directory: packages/python
        run: pytest tests/
